# Built-in provider/model catalog. Always loaded as the base layer; the
# user's ~/.tcode/config.toml overlays it. Profiles merge by their toml
# key (same key → fields and models merge, new key → added); models merge
# by `name` (same name → overridden, new name → appended). Context sizes
# live here so the harness never has to guess them from a model id.
#
# Model IDs, context windows, and pricing tiers verified 2026-07.

# Known-model catalog: intrinsic properties of a model id, independent of which
# provider serves it. A profile lists models by name (`models = ["id", ...]`)
# and inherits these; an explicit field on a profile's own model entry
# overrides field by field. Reaching the same model through a second endpoint
# (a proxy, OpenRouter) needs only the name — the params are found here.
[models."claude-fable-5"]
label = "Claude Fable 5"
# Fable 5 always thinks; no effort dial (the picker's "auto" sends nothing).
context_window = 1000000

[models."claude-opus-4-8"]
label = "Claude Opus 4.8"
context_window = 1000000
efforts = ["off", "low", "medium", "high"]

[models."claude-sonnet-5"]
label = "Claude Sonnet 5"
context_window = 1000000
efforts = ["off", "low", "medium", "high"]

[models."claude-haiku-4-5"]
label = "Claude Haiku 4.5"
context_window = 200000

[models."gpt-5.6-sol"]
label = "GPT-5.6 Sol"
context_window = 1050000
efforts = ["low", "medium", "high"]
default_effort = "medium"

[models."gpt-5.6-terra"]
label = "GPT-5.6 Terra"
context_window = 1050000
efforts = ["low", "medium", "high"]
default_effort = "medium"

[models."gpt-5.6-luna"]
label = "GPT-5.6 Luna"
context_window = 1050000
efforts = ["low", "medium", "high"]
default_effort = "medium"

# Thinks unconditionally: ignores `thinking: {type: disabled}` and answers
# after a reasoning preamble, so no effort dial.
[models."tencent/hy3:free"]
label = "Tencent Hy3 (free)"
context_window = 262144

# DeepSeek's real model ids (the 1M context is a property, not a `[1m]` suffix).
# Thinking is ON by default server-side; "off" disables it.
[models."deepseek-v4-pro"]
label = "DeepSeek V4 Pro"
context_window = 1000000
efforts = ["off", "low", "medium", "high"]

[models."deepseek-v4-flash"]
label = "DeepSeek V4 Flash"
context_window = 1000000
efforts = ["off", "low", "medium", "high"]

[models."agnes-2.0-flash"]
label = "Agnès 2.0 Flash"
context_window = 262144

[models."agnes-1.5-flash"]
label = "Agnès 1.5 Flash"
context_window = 262144

# Anonymous, HTTPS GET-only reads that a tool has explicitly declared safe.
# This does not apply to shell or bash, and project configuration cannot extend it.
[limits]
# Set `auto_compact = false` to manage summary timing manually with `/compact`.
# `auto_compact_percent` is clamped to 1..=100 when the agent runs.
auto_compact = true
auto_compact_percent = 85
# Set `shell_output_filters = false` to hand every successful shell output to
# the model verbatim. Only the user's config decides this; a project's
# `.tcode/config.toml` cannot turn it back on.
shell_output_filters = true

[auto_mode]
# Stage deadlines cover the whole classification attempt through a parseable
# verdict, not merely the provider's byte-level stream idle time. A stage gets
# one immediate retry after timeout, transport failure, or invalid verdict.
fast_timeout_secs = 10
reasoned_timeout_secs = 20
retry_count = 1
trusted_read_hosts = ["api.github.com", "raw.githubusercontent.com"]

[profiles.anthropic]
provider = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"
models = ["claude-fable-5", "claude-opus-4-8", "claude-sonnet-5", "claude-haiku-4-5"]

[profiles.openai]
provider = "openai"
api_key_env = "OPENAI_API_KEY"
models = ["gpt-5.6-sol", "gpt-5.6-terra", "gpt-5.6-luna"]

# ChatGPT subscription through the Codex backend. Its provider adapter fills
# an empty model list from the local runtime catalogue before model selection.
[profiles.codex]
provider = "codex"
# Codex Responses accepts input_image; keep pasted/read images inline.
vision = true

# OpenRouter, reached over its Anthropic-compatible Messages endpoint
# (`/api/v1/messages`, which this base_url + the provider's `/v1/messages`
# suffix produce). It accepts our `x-api-key` auth, streams the standard
# Anthropic SSE shape, and passes tool calls through, so no new wire is
# needed — this is the same shape as the DeepSeek profile below.
# For the OpenAI wire instead, use `provider = "openai"` with
# `base_url = "https://openrouter.ai/api/v1"`.
#
# OpenRouter fronts hundreds of models; only the free test model ships here.
# Add the ids you use (from openrouter.ai/models) to ~/.tcode/config.toml.
[profiles.openrouter]
provider = "anthropic"
api_key_env = "OPENROUTER_API_KEY"
base_url = "https://openrouter.ai/api"

[[profiles.openrouter.models]]
name = "tencent/hy3:free"

# DeepSeek's Anthropic-compatible endpoint. Model params live in `[models.*]`.
[profiles.deepseek]
provider = "anthropic"
api_key_env = "DEEPSEEK_API_KEY"
base_url = "https://api.deepseek.com/anthropic"
# Text-only: save pasted images to scratch and delegate with view_image.
vision = false
models = ["deepseek-v4-pro", "deepseek-v4-flash"]

# Agnès AI — OpenAI-compatible Chat Completions endpoint.
# https://agnes-ai.com  |  https://platform.agnes-ai.com
[profiles.agnes]
provider = "openai"
api_key_env = "AGNES_API_KEY"
base_url = "https://apihub.agnes-ai.com/v1"
models = ["agnes-2.0-flash", "agnes-1.5-flash"]
