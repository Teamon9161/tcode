name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl produces one portable, statically linked Linux binary per CPU.
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: tcode
            asset: tcode-x86_64-linux
            zig: true
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: tcode
            asset: tcode-aarch64-linux
            zig: true
          # Cross-compiled from the Apple Silicon runner: the Intel macos-13
          # runners have scarce capacity and long queues, and are being retired.
          - runner: macos-14
            target: x86_64-apple-darwin
            binary: tcode
            asset: tcode-x86_64-macos
            zig: false
          - runner: macos-14
            target: aarch64-apple-darwin
            binary: tcode
            asset: tcode-aarch64-macos
            zig: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tcode.exe
            asset: tcode-x86_64-windows.exe
            zig: false
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary: tcode.exe
            asset: tcode-aarch64-windows.exe
            zig: false

    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: matrix.zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.zig
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Restore compiler cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Verify tag version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          manifest_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' Cargo.toml | head -n 1)"
          test "$version" = "$manifest_version" || {
            echo "tag v$version does not match Cargo.toml version $manifest_version" >&2
            exit 1
          }

      - name: Build Linux release binary
        if: matrix.zig
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Build native release binary
        if: ${{ !matrix.zig }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum tcode-* > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/tcode-*
            dist/checksums.txt
          generate_release_notes: true
