name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # musl produces one portable, statically linked Linux binary per CPU.
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: tcode
            asset: tcode-x86_64-linux
            zig: true
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: tcode
            asset: tcode-aarch64-linux
            zig: true
          # Cross-compiled from the Apple Silicon runner: the Intel macos-13
          # runners have scarce capacity and long queues, and are being retired.
          - runner: macos-14
            target: x86_64-apple-darwin
            binary: tcode
            asset: tcode-x86_64-macos
            zig: false
          - runner: macos-14
            target: aarch64-apple-darwin
            binary: tcode
            asset: tcode-aarch64-macos
            zig: false
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tcode.exe
            asset: tcode-x86_64-windows.exe
            zig: false
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary: tcode.exe
            asset: tcode-aarch64-windows.exe
            zig: false

    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: matrix.zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.zig
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Restore compiler cache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Verify tag version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          manifest_version="$(
            awk '
              /^\[workspace\.package\]$/ { in_workspace_package = 1; next }
              in_workspace_package && /^\[/ { exit }
              in_workspace_package && /^version = "/ {
                value = $0
                sub(/^version = "/, "", value)
                sub(/"$/, "", value)
                print value
                exit
              }
            ' Cargo.toml
          )"
          test "$version" = "$manifest_version" || {
            echo "tag v$version does not match Cargo.toml version $manifest_version" >&2
            exit 1
          }

      - name: Build Linux release binary
        if: matrix.zig
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Build native release binary
        if: ${{ !matrix.zig }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  # The voice sidecar, built separately on purpose. Two reasons it must not
  # join the matrix above: sherpa-onnx's build script downloads a prebuilt
  # native library, so an upstream hiccup would otherwise take the whole
  # release down with it; and it cannot be built for every target tcode
  # supports. `fail-fast: false` plus a publish step that uploads whatever
  # exists means a missing sidecar costs its own platform and nothing else.
  #
  # Targets are fewer than tcode's on purpose:
  #   - Linux is gnu, not musl: upstream publishes no musl libraries, and the
  #     static build still links libstdc++, libasound and glibc dynamically.
  #     Built on the oldest runner available to keep the glibc floor low.
  #   - windows-aarch64 has no upstream library at all, so it has no row here
  #     and tcode says so rather than offering a download that cannot exist.
  voiced:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary: tcode-voiced
            asset: tcode-voiced-x86_64-linux
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            binary: tcode-voiced
            asset: tcode-voiced-aarch64-linux
          - runner: macos-14
            target: x86_64-apple-darwin
            binary: tcode-voiced
            asset: tcode-voiced-x86_64-macos
          - runner: macos-14
            target: aarch64-apple-darwin
            binary: tcode-voiced
            asset: tcode-voiced-aarch64-macos
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: tcode-voiced.exe
            asset: tcode-voiced-x86_64-windows.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # cpal records through ALSA on Linux, which needs its headers to build
      # and libasound2 present to run.
      - name: Install ALSA headers
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build sidecar
        run: >-
          cargo build --release --locked
          --manifest-path crates/tcode-voiced/Cargo.toml
          --target ${{ matrix.target }}

      - name: Package release asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "crates/tcode-voiced/target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            "dist/${{ matrix.asset }}"

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    # Waits for the sidecars so their assets are in `dist`, but only `build`
    # has to have succeeded: a sidecar that failed to build costs its own
    # platform voice input and must never hold back a tcode release.
    needs: [build, voiced]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum tcode-* > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/tcode-*
            dist/checksums.txt
          generate_release_notes: true
