[permissions]
allow = ['''run($codexDir = if ($env:CODEX_HOME) { $env:CODEX_HOME } else { Join-Path $env:USERPROFILE '.codex' }; $authPath = Join-Path $codexDir 'auth.json'; $cachePath = Join-Path $codexDir 'models_cache.json'; $hasTokens = $false; if (Test-Path $authPath) { try { $authJson = Get-Content -Raw $authPath | ConvertFrom-Json; $hasTokens = [bool]$authJson.tokens.access_token } catch {} }; [pscustomobject]@{ codex_home=$codexDir; auth_file_exists=(Test-Path $authPath); auth_has_required_tokens=$hasTokens; models_cache_exists=(Test-Path $cachePath) } | Format-List; if (Test-Path $cachePath) { $cacheJson = Get-Content -Raw $cachePath | ConvertFrom-Json; $cacheJson.models | Where-Object { $_.slug -match 'gpt-5\.6' } | Select-Object slug,display_name,context_window,max_context_window,effective_context_window_percent,auto_compact_token_limit,visibility,default_reasoning_level | Format-Table -AutoSize })''', "run(cargo fmt --check; cargo check --workspace)", "run(cargo fmt; cargo test -p tcode-core -p tcode-tools --test agent_loop)"]
